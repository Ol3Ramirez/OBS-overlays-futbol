<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Replay — OBS Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── Badge REPETICIÓN (esquina superior izquierda) ── */
  .replay-badge {
    position: absolute;
    top: 32px;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(6, 6, 14, 0.88);
    border: 2px solid rgba(255, 215, 0, 0.6);
    border-radius: 8px;
    padding: 10px 22px 10px 16px;
    opacity: 0;
    transform: translateX(-60px);
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .replay-badge.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .replay-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .replay-icon svg {
    width: 100%;
    height: 100%;
    fill: #FFD700;
    filter: drop-shadow(0 0 6px rgba(255,215,0,0.5));
  }

  .replay-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .replay-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: #FFD700;
    text-shadow: 0 0 16px rgba(255,215,0,0.5);
  }

  .replay-sub {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  /* ── Banda inferior: EN CÁMARA LENTA ── */
  .slowmo-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: linear-gradient(90deg,
      rgba(6,6,14,0.96) 0%,
      rgba(30,22,0,0.96) 50%,
      rgba(6,6,14,0.96) 100%
    );
    border-top: 2px solid rgba(255,215,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    transform: translateY(100%);
    transition: opacity 0.4s ease 0.15s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s;
  }

  .slowmo-bar.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .slowmo-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .slowmo-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #FFD700;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .slowmo-dot:nth-child(2) { animation-delay: 0.2s; }
  .slowmo-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.25; transform: scale(0.6); }
  }

  .slowmo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.7);
  }

  .slowmo-speed {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #FFD700;
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
  }

  /* ── Vignette lateral para enmarcar el video ── */
  .vignette {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(6,6,14,0.25) 0%, transparent 12%, transparent 88%, rgba(6,6,14,0.25) 100%),
      linear-gradient(180deg, rgba(6,6,14,0.1) 0%, transparent 15%, transparent 75%, rgba(6,6,14,0.1) 100%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .vignette.visible { opacity: 1; }
</style>
</head>
<body>

<div class="vignette" id="vignette"></div>

<div class="replay-badge" id="replay-badge">
  <div class="replay-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
    </svg>
  </div>
  <div class="replay-text">
    <span class="replay-label">REPETICIÓN</span>
    <span class="replay-sub" id="replay-sub">EN CÁMARA LENTA</span>
  </div>
</div>

<div class="slowmo-bar" id="slowmo-bar">
  <div class="slowmo-dots">
    <div class="slowmo-dot"></div>
    <div class="slowmo-dot"></div>
    <div class="slowmo-dot"></div>
  </div>
  <span class="slowmo-text">EN CÁMARA LENTA</span>
  <span class="slowmo-speed" id="slowmo-speed">0.5×</span>
</div>

<script>
  var _hideTimer = null;

  function _show() {
    clearTimeout(_hideTimer);
    document.getElementById('vignette').classList.add('visible');
    document.getElementById('replay-badge').classList.add('visible');
    document.getElementById('slowmo-bar').classList.add('visible');
  }

  function _hide() {
    document.getElementById('vignette').classList.remove('visible');
    document.getElementById('replay-badge').classList.remove('visible');
    document.getElementById('slowmo-bar').classList.remove('visible');
  }

  // Leer factor de slow-mo desde config.js si está disponible
  if (window.SRYI && window.SRYI.REPLAY_SLOWMO_FACTOR) {
    var factor = window.SRYI.REPLAY_SLOWMO_FACTOR;
    document.getElementById('slowmo-speed').textContent = factor + '×';
  }

  window.obsOverlay = {
    triggerReplay: function() {
      _show();
      // Auto-ocultar: duración del replay desde config o fallback 12s
      var duration = (window.SRYI && window.SRYI.REPLAY_DURATION) ? window.SRYI.REPLAY_DURATION : 12;
      _hideTimer = setTimeout(_hide, (duration + 0.5) * 1000);
    },
    hideReplay: function() {
      clearTimeout(_hideTimer);
      _hide();
    }
  };
</script>
<script src="ws-client.js"></script>
</body>
</html>
