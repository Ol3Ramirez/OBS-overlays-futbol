<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Medio Tiempo — SRYiyo</title>
<script src="config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1920px; height: 1080px; overflow: hidden;
  background: linear-gradient(160deg, #0a0810 0%, #100a14 50%, #080610 100%);
  font-family: 'Arial Black', sans-serif;
  position: relative;
}
:root { --gold: #FFD700; --accent: #c62828; --glass: rgba(6, 6, 18, 0.97); }

.bg-beam { position: absolute; width: 2px; height: 300px; background: linear-gradient(to bottom, transparent, rgba(198,40,40,0.10), transparent); animation: beamFloat 7s ease-in-out infinite; will-change: transform, opacity; top: -80px; }
.bg-beam:nth-child(1) { left: 6%;  animation-delay: 0s; }
.bg-beam:nth-child(2) { left: 18%; animation-delay: 2.1s; width:1px; background: linear-gradient(to bottom, transparent, rgba(255,213,0,0.08), transparent); }
.bg-beam:nth-child(3) { left: 32%; animation-delay: 1.2s; }
.bg-beam:nth-child(4) { left: 50%; animation-delay: 3.5s; width:3px; }
.bg-beam:nth-child(5) { left: 68%; animation-delay: 0.8s; }
.bg-beam:nth-child(6) { left: 82%; animation-delay: 2.6s; width:1px; background: linear-gradient(to bottom, transparent, rgba(255,213,0,0.08), transparent); }
.bg-beam:nth-child(7) { left: 94%; animation-delay: 1.7s; }
@keyframes beamFloat { 0%, 100% { transform: translateY(0) scaleY(1); opacity: 0.4; } 50% { transform: translateY(1300px) scaleY(1.3); opacity: 0; } }

.spark { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); animation: sparkle 4.5s ease-in-out infinite; will-change: transform, opacity; }
.spark:nth-child(1)  { top:8%;  left:5%;  animation-delay:0s; }
.spark:nth-child(2)  { top:22%; left:15%; animation-delay:1.2s; background:var(--accent); }
.spark:nth-child(3)  { top:75%; left:8%;  animation-delay:2.4s; }
.spark:nth-child(4)  { top:88%; left:25%; animation-delay:0.6s; background:var(--accent); }
.spark:nth-child(5)  { top:12%; left:75%; animation-delay:3.1s; }
.spark:nth-child(6)  { top:40%; left:88%; animation-delay:1.8s; background:var(--gold); }
.spark:nth-child(7)  { top:80%; left:92%; animation-delay:0.9s; }
.spark:nth-child(8)  { top:5%;  left:48%; animation-delay:2.0s; background:#fff; }
.spark:nth-child(9)  { top:55%; left:3%;  animation-delay:3.6s; background:var(--accent); }
.spark:nth-child(10) { top:30%; left:96%; animation-delay:1.4s; }
@keyframes sparkle { 0%, 100% { opacity:0; transform:scale(0.4); } 50% { opacity:1; transform:scale(1.8); } }

.corner { position: absolute; width: 50px; height: 50px; opacity: 0.6; }
.corner::before { content:''; position:absolute; top:0; left:0; width:100%; height:2px; background:var(--accent); }
.corner::after  { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--accent); }
.corner.tl { top:28px; left:28px; }
.corner.tr { top:28px; right:28px; transform:scaleX(-1); }
.corner.bl { bottom:28px; left:28px; transform:scaleY(-1); }
.corner.br { bottom:28px; right:28px; transform:scale(-1); }

.side-deco { position:absolute; top:0; bottom:0; width:390px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:40px; pointer-events:none; }
.side-deco.left  { left:0; } .side-deco.right { right:0; }
.side-line { width:1px; height:200px; background:linear-gradient(180deg, transparent, rgba(198,40,40,0.2), transparent); animation:sidePulse 3s ease-in-out infinite; }
.side-deco.right .side-line { animation-delay: 1.5s; }
@keyframes sidePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.side-badge { display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0.55; }
.side-badge-text { font-size:11px; letter-spacing:4px; color:var(--accent); text-transform:uppercase; writing-mode:vertical-rl; text-orientation:mixed; }
.side-icon { font-size:28px; opacity:0.7; }

.center-scene { position:absolute; left:390px; right:390px; top:0; bottom:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; }

.logo-area { position:relative; display:flex; align-items:center; justify-content:center; width:500px; height:500px; margin-bottom:8px; }
.logo-ring, .logo-ring-2, .logo-ring-3 { position:absolute; border-radius:50%; will-change:transform, opacity; }
.logo-ring   { width:320px; height:320px; border:1px solid rgba(198,40,40,0.15); animation:ringPulse 2.8s ease-in-out infinite; }
.logo-ring-2 { width:400px; height:400px; border:1px solid rgba(198,40,40,0.07); animation:ringPulse 2.8s ease-in-out infinite 0.7s; }
.logo-ring-3 { width:500px; height:500px; border:1px solid rgba(255,213,0,0.05); animation:ringPulse 2.8s ease-in-out infinite 1.4s; }
@keyframes ringPulse { 0%, 100% { transform:scale(1); opacity:0.6; } 50% { transform:scale(1.04); opacity:1; } }
.logo-wrap { position:relative; z-index:1; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.97); border:4px solid var(--accent); filter:drop-shadow(0 0 30px rgba(198,40,40,0.4)); animation:ringPulse 2.4s ease-in-out infinite; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.logo-wrap img { width:180px; height:180px; object-fit:contain; }

.divider { width:280px; height:1px; background:linear-gradient(90deg, transparent, rgba(198,40,40,0.5), transparent); margin-bottom:24px; animation: fadeDown 0.8s 0.2s both; }

.badge { display:flex; align-items:center; gap:14px; border:1px solid rgba(198,40,40,0.3); border-radius:40px; padding:10px 32px; margin-bottom:20px; position:relative; overflow:hidden; animation: fadeDown 0.8s 0.3s both; }
.badge::before { content:''; position:absolute; inset:0; background:rgba(198,40,40,0.04); border-radius:40px; animation:badgePulse 2.4s ease-in-out infinite; }
@keyframes badgePulse { 0%,100%{ opacity:0.5; } 50%{ opacity:1; } }
.badge-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); flex-shrink:0; animation:liveBlink 1.2s ease-in-out infinite; }
@keyframes liveBlink { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }
.badge-text { font-size:18px; letter-spacing:8px; color:var(--accent); text-transform:uppercase; font-weight:700; position:relative; z-index:1; }

.score-line { display:none; align-items:center; gap:20px; margin-bottom:20px; animation: fadeDown 0.5s ease both; }
.score-line.visible { display:flex; }
.score-team { font-size:22px; font-weight:900; color:#fff; letter-spacing:2px; text-transform:uppercase; }
.score-numbers { font-size:56px; font-weight:900; color:var(--gold); letter-spacing:-2px; line-height:1; }
.score-sep { font-size:32px; font-weight:900; color:rgba(255,255,255,0.3); }

.ball-wrap { margin-bottom:20px; animation: fadeDown 0.8s 0.5s both; }
.ball { font-size:72px; display:inline-block; filter:drop-shadow(0 0 20px rgba(255,215,0,0.5)); will-change:transform; animation:ballBounce 1.8s ease-in-out infinite; }
@keyframes ballBounce { 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-16px) rotate(12deg); } }

.main-text { font-size:88px; font-weight:900; letter-spacing:8px; text-transform:uppercase; line-height:1; margin-bottom:16px; background: linear-gradient(90deg, #FFD700 0%, #fff 45%, #FFD700 55%, #FFD700 100%); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeDown 0.8s 0.4s both, textShine 4s linear 1.5s infinite; }
@keyframes textShine { 0% { background-position:0% 0; } 100%{ background-position:200% 0; } }

.sub-text { font-size:26px; letter-spacing:6px; color:rgba(255,255,255,0.55); text-transform:uppercase; display:flex; align-items:baseline; gap:2px; animation: fadeDown 0.8s 0.55s both; margin-bottom:28px; }
.dots span { display:inline-block; animation:dotsBounce 1.4s ease-in-out infinite; }
.dots span:nth-child(2){ animation-delay:0.2s; } .dots span:nth-child(3){ animation-delay:0.4s; }
@keyframes dotsBounce { 0%,60%,100%{ transform:translateY(0); opacity:0.6; } 30%{ transform:translateY(-5px); opacity:1; } }

.live-badge { display:flex; align-items:center; gap:10px; animation: fadeDown 0.8s 0.65s both; }
.live-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:liveBlink 1.2s ease-in-out infinite; }
.live-text { font-size:14px; letter-spacing:5px; color:rgba(255,255,255,0.4); text-transform:uppercase; }

@keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }

.bottom-bar { position:absolute; bottom:32px; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:20px; background:rgba(6,6,18,0.9); border-top:1px solid rgba(198,40,40,0.2); border-bottom:1px solid rgba(198,40,40,0.2); padding:10px 40px; white-space:nowrap; }
.bb-ball { font-size:20px; }
.bb-text  { font-size:13px; font-weight:700; color:rgba(255,255,255,0.55); letter-spacing:3px; text-transform:uppercase; }
.bb-sep   { width:1px; height:18px; background:rgba(255,255,255,0.15); }
.bb-brand { font-size:13px; font-weight:900; color:var(--gold); letter-spacing:3px; text-transform:uppercase; }
</style>
</head>
<body>

<div class="bg-beam"></div><div class="bg-beam"></div><div class="bg-beam"></div>
<div class="bg-beam"></div><div class="bg-beam"></div><div class="bg-beam"></div><div class="bg-beam"></div>
<div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
<div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
<div class="spark"></div><div class="spark"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="side-deco left">
  <div class="side-line"></div>
  <div class="side-badge">
    <div class="side-badge-text" id="side-label-l">ROBLES FÚTBOL</div>
    <div class="side-icon">⚽</div>
  </div>
  <div class="side-line"></div>
</div>
<div class="side-deco right">
  <div class="side-line"></div>
  <div class="side-badge">
    <div class="side-icon">🏆</div>
    <div class="side-badge-text" id="side-label-r">EN VIVO</div>
  </div>
  <div class="side-line"></div>
</div>

<div class="center-scene">
  <div class="logo-area">
    <div class="logo-ring-3"></div><div class="logo-ring-2"></div><div class="logo-ring"></div>
    <div class="logo-wrap">
      <img src="./logo_robles.jpeg" alt="Robles Fútbol" />
    </div>
  </div>
  <div class="divider"></div>
  <div class="badge">
    <div class="badge-dot"></div>
    <div class="badge-text" id="badge-label">Medio Tiempo</div>
  </div>
  <div class="score-line" id="score-line">
    <div class="score-team" id="score-home">ROBLES</div>
    <div class="score-numbers">
      <span id="score-h">0</span>
      <span class="score-sep"> – </span>
      <span id="score-a">0</span>
    </div>
    <div class="score-team" id="score-away">OSORIO</div>
  </div>
  <div class="ball-wrap"><div class="ball">⚽</div></div>
  <div class="main-text" id="main-text">Volvemos Pronto</div>
  <div class="sub-text">
    <span id="sub-text">Disfruta el descanso</span>
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <div class="live-text" id="live-text">Robles Fútbol en vivo</div>
  </div>
</div>

<div class="bottom-bar">
  <div class="bb-ball">⚽</div>
  <div class="bb-text">Patrocinado por</div>
  <div class="bb-sep"></div>
  <div class="bb-brand" id="sponsor-name">Robles Fútbol</div>
</div>

<script>
  let _home='ROBLES', _away='OSORIO';

  function setText(main, sub) {
    if (main) document.getElementById('main-text').textContent = main;
    if (sub)  document.getElementById('sub-text').textContent  = sub;
  }
  function setBadge(label) { if (label) document.getElementById('badge-label').textContent = label; }
  function setTeams(home, away) {
    _home = home || _home; _away = away || _away;
    document.getElementById('score-home').textContent = _home.toUpperCase().substring(0,8);
    document.getElementById('score-away').textContent = _away.toUpperCase().substring(0,8);
  }
  function setScore(h, a) {
    document.getElementById('score-h').textContent = h;
    document.getElementById('score-a').textContent = a;
    document.getElementById('score-line').classList.add('visible');
  }
  function clearScore() { document.getElementById('score-line').classList.remove('visible'); }

  window.obsOverlay = { setText, setBadge, setTeams, setScore, clearScore };

  // Auto-init con config SRYI
  if (window.SRYI) {
    setTeams(window.SRYI.HOME, window.SRYI.AWAY);
    document.getElementById('live-text').textContent = window.SRYI.SPONSOR + ' en vivo';
    document.getElementById('sponsor-name').textContent = window.SRYI.SPONSOR;
    document.getElementById('side-label-l').textContent = window.SRYI.SPONSOR;
  }

  let _wsDelay = 1000;
  (function wsConnect() {
    const port = (window.SRYI && window.SRYI.WS_PORT) || 8891;
    const ws = new WebSocket(`ws://localhost:${port}`);
    ws.onopen    = () => { _wsDelay = 1000; };
    ws.onmessage = (e) => {
      try { const cmd=JSON.parse(e.data); if(window.obsOverlay&&window.obsOverlay[cmd.fn]) window.obsOverlay[cmd.fn](...(cmd.args||[])); } catch(_) {}
    };
    ws.onclose = () => { setTimeout(wsConnect, _wsDelay); _wsDelay = Math.min(_wsDelay * 1.5, 30000); };
  })();
</script>
</body>
</html>
