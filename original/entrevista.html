<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Entrevista / Talk Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 1920px; height: 1080px;
  overflow: hidden;
  font-family: 'Barlow Condensed', 'Arial Black', sans-serif;
  position: relative;
}

/* ── Design Tokens ── */
:root {
  --gold:          #FFD700;
  --gold-dim:      rgba(255,215,0,0.15);
  --gold-glow:     rgba(255,215,0,0.45);
  --cyan:          #00E5FF;
  --cyan-dim:      rgba(0,229,255,0.10);
  --bg-dark:       #060b16;
  --glass:         rgba(6,6,18,0.88);
  --glass-border:  rgba(255,215,0,0.20);
  --text-primary:  #FFFFFF;
  --text-muted:    rgba(255,255,255,0.60);
  --shadow-gold:   0 0 24px rgba(255,215,0,0.35);
  --t-smooth:      600ms cubic-bezier(0.4,0,0.2,1);
  --t-fast:        250ms cubic-bezier(0.4,0,0.2,1);
}

/* ── Modes — default is overlay (transparent, para poner sobre cámara) ── */
body                    { background: transparent; }              /* overlay por defecto */
body.mode-standalone    { background: linear-gradient(160deg, #070b18 0%, #0a1020 50%, #060d16 100%); }
body.mode-lower-third   { background: transparent; }

/* In lower-third mode hide everything except lower strip */
body.mode-lower-third .bg-beam,
body.mode-lower-third .spark,
body.mode-lower-third .corner,
body.mode-lower-third .side-deco,
body.mode-lower-third .interview-badge,
body.mode-lower-third .topic-ticker,
body.mode-lower-third .sponsor-logo { display: none; }

/* In overlay mode keep beams/sparkles subtle but visible */
body .bg-beam { opacity: 0.25; }
body .spark   { opacity: 0.7; }
body.mode-standalone .bg-beam { opacity: 0.4; }
body.mode-standalone .spark   { opacity: 1; }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── Background Beams ── */
.bg-beam {
  position: absolute; width: 2px; height: 300px;
  background: linear-gradient(to bottom, transparent, rgba(255,213,0,0.12), transparent);
  animation: beamFloat 7s ease-in-out infinite;
  will-change: transform, opacity;
  top: -80px;
}
.bg-beam:nth-child(1) { left:6%;  animation-delay:0s; }
.bg-beam:nth-child(2) { left:18%; animation-delay:2.1s; width:1px; background:linear-gradient(to bottom,transparent,rgba(0,229,255,0.1),transparent); }
.bg-beam:nth-child(3) { left:32%; animation-delay:1.2s; }
.bg-beam:nth-child(4) { left:50%; animation-delay:3.5s; width:3px; }
.bg-beam:nth-child(5) { left:68%; animation-delay:0.8s; }
.bg-beam:nth-child(6) { left:82%; animation-delay:2.6s; width:1px; background:linear-gradient(to bottom,transparent,rgba(0,229,255,0.1),transparent); }
.bg-beam:nth-child(7) { left:94%; animation-delay:1.7s; }

@keyframes beamFloat {
  0%,100% { transform:translateY(0) scaleY(1); opacity:0.4; }
  50%      { transform:translateY(1300px) scaleY(1.3); opacity:0; }
}

/* ── Sparkles ── */
.spark {
  position:absolute; width:4px; height:4px;
  border-radius:50%; background:var(--gold);
  animation:sparkle 4.5s ease-in-out infinite;
  will-change: transform, opacity;
}
.spark:nth-child(1)  { top:8%;  left:5%;  animation-delay:0s; }
.spark:nth-child(2)  { top:22%; left:15%; animation-delay:1.2s; background:var(--cyan); }
.spark:nth-child(3)  { top:75%; left:8%;  animation-delay:2.4s; }
.spark:nth-child(4)  { top:88%; left:25%; animation-delay:0.6s; background:var(--cyan); }
.spark:nth-child(5)  { top:12%; left:75%; animation-delay:3.1s; }
.spark:nth-child(6)  { top:40%; left:88%; animation-delay:1.8s; background:var(--cyan); }
.spark:nth-child(7)  { top:80%; left:92%; animation-delay:0.9s; }
.spark:nth-child(8)  { top:5%;  left:48%; animation-delay:2.0s; background:#fff; }
.spark:nth-child(9)  { top:55%; left:3%;  animation-delay:3.6s; background:var(--cyan); }
.spark:nth-child(10) { top:30%; left:96%; animation-delay:1.4s; }

@keyframes sparkle {
  0%,100% { opacity:0; transform:scale(0.4); }
  50%      { opacity:1; transform:scale(1.8); }
}

/* ── Gold Corners ── */
.corner {
  position:absolute; width:50px; height:50px; opacity:0.6;
}
.corner::before { content:''; position:absolute; top:0; left:0; width:100%; height:2px; background:var(--gold); }
.corner::after  { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--gold); }
.corner.tl { top:28px; left:28px; }
.corner.tr { top:28px; right:28px; transform:scaleX(-1); }
.corner.bl { bottom:28px; left:28px; transform:scaleY(-1); }
.corner.br { bottom:28px; right:28px; transform:scale(-1); }

/* ── Side Decorations — más visibles sobre cámara ── */
.side-deco {
  position:absolute; top:0; bottom:0;
  width:390px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px;
  pointer-events:none;
}
.side-deco.left  { left:0; }
.side-deco.right { right:0; }

/* Línea vertical completa a lo largo de la columna */
.side-deco::before {
  content:'';
  position:absolute; top:0; bottom:0;
  width:2px;
  background:linear-gradient(to bottom,
    transparent 0%, rgba(255,215,0,0.35) 20%,
    rgba(255,215,0,0.55) 50%,
    rgba(255,215,0,0.35) 80%, transparent 100%);
  animation:sidePulse 3s ease-in-out infinite;
}
.side-deco.left::before  { right:0; }
.side-deco.right::before { left:0; }

@keyframes sidePulse {
  0%,100% { opacity:0.6; }
  50%      { opacity:1; }
}

.side-line {
  width:2px; flex:1; max-height:180px;
  background:linear-gradient(to bottom, transparent, rgba(255,215,0,0.40), transparent);
}

.side-badge {
  background:rgba(8,8,20,0.75);
  border:1px solid rgba(255,215,0,0.40);
  border-radius:8px; padding:16px 10px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  box-shadow:0 0 20px rgba(255,215,0,0.12), inset 0 1px 0 rgba(255,215,0,0.15);
}
.side-badge-text {
  font-size:13px; letter-spacing:4px; color:rgba(255,215,0,0.85);
  text-transform:uppercase; font-weight:900;
  writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg);
}
.side-icon {
  font-size:0; width:24px; height:24px; opacity:0.7;
  display:flex; align-items:center; justify-content:center;
}

/* ── Interview Badge (top center) ── */
.interview-badge {
  position:absolute;
  top:36px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:12px;
  background:rgba(6,6,20,0.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,215,0,0.50);
  border-radius:30px; padding:12px 32px;
  box-shadow:0 0 30px rgba(255,215,0,0.20), 0 4px 20px rgba(0,0,0,0.6);
  white-space:nowrap;
  opacity:0; transition:opacity var(--t-fast);
}
.interview-badge.visible { opacity:1; animation:badgePulse 2.5s ease-in-out infinite; }

@keyframes badgePulse {
  0%,100% { box-shadow:0 0 12px rgba(255,215,0,0.15); }
  50%      { box-shadow:0 0 28px rgba(255,215,0,0.35); }
}

.badge-dot {
  width:10px; height:10px; border-radius:50%;
  background:#ff3b3b;
  animation:dotBlink 1.5s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes dotBlink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

.badge-label {
  font-size:20px; font-weight:900; letter-spacing:5px;
  color:var(--gold); text-transform:uppercase;
  text-shadow:0 0 20px rgba(255,215,0,0.6);
}

/* ── Sponsor Logo (top-right corner) ── */
.sponsor-logo {
  position:absolute;
  top:36px; right:430px;
  width:80px; height:80px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,215,0,0.3);
  box-shadow:0 0 20px rgba(255,215,0,0.15);
  opacity:0.85;
}
.sponsor-logo img { width:100%; height:100%; object-fit:cover; }

/* ── Topic Ticker ── */
.topic-ticker {
  position:absolute;
  bottom:180px; left:0; right:0;
  height:46px;
  background:rgba(0,0,0,0.70);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,215,0,0.18);
  border-bottom:1px solid rgba(255,215,0,0.18);
  display:flex; align-items:center;
  overflow:hidden;
  opacity:0; transition:opacity var(--t-fast);
}
.topic-ticker.visible { opacity:1; }

.ticker-label {
  flex-shrink:0;
  padding:0 20px 0 24px;
  font-size:13px; font-weight:700; letter-spacing:3px;
  color:var(--gold); text-transform:uppercase;
  border-right:1px solid rgba(255,215,0,0.25);
  white-space:nowrap;
}

.ticker-track {
  flex:1; overflow:hidden; position:relative;
  height:100%; display:flex; align-items:center;
}
.ticker-text {
  white-space:nowrap;
  font-size:15px; font-weight:600; letter-spacing:2px;
  color:#fff; text-transform:uppercase;
  animation:tickerScroll 22s linear infinite;
  will-change:transform;
  padding-left:24px;
}
@keyframes tickerScroll {
  from { transform:translateX(100%); }
  to   { transform:translateX(-100%); }
}

/* ── Lower Third Panel ── */
.lower-third {
  position:absolute;
  bottom:96px; left:0; right:0;
  padding:0 430px;
  transform:translateY(130%);
  transition:transform var(--t-smooth);
  will-change:transform;
}
.lower-third.visible { transform:translateY(0); }

.lt-panel {
  background:rgba(6,6,18,0.88);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:10px;
  overflow:hidden;
  display:flex;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), var(--shadow-gold);
  position:relative;
}

/* Gold top accent line */
.lt-panel::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), var(--cyan), var(--gold), transparent);
}

/* Side role badge */
.lt-side-badge {
  width:44px; flex-shrink:0;
  background:var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  border-right:1px solid var(--glass-border);
  position:relative;
  overflow:hidden;
}
.lt-side-badge::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,215,0,0.08), transparent, rgba(255,215,0,0.08));
}
.lt-side-text {
  font-size:9px; font-weight:900; letter-spacing:3px;
  color:var(--gold); text-transform:uppercase;
  writing-mode:vertical-rl; text-orientation:mixed;
  transform:rotate(180deg);
  position:relative; z-index:1;
}

/* Main content */
.lt-content {
  flex:1; padding:18px 24px;
  display:flex; flex-direction:column; justify-content:center;
  gap:6px;
}

.lt-name {
  font-size:52px; font-weight:900; line-height:1;
  letter-spacing:2px; text-transform:uppercase;
  background:linear-gradient(90deg, #fff 60%, var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:nameReveal var(--t-smooth) ease both;
}
@keyframes nameReveal {
  from { opacity:0; transform:translateX(-16px); }
  to   { opacity:1; transform:translateX(0); }
}

.lt-role {
  font-size:22px; font-weight:600; letter-spacing:3px;
  color:var(--cyan); text-transform:uppercase;
  animation:roleSlide 400ms 200ms ease both;
}
@keyframes roleSlide {
  from { opacity:0; transform:translateX(-12px); }
  to   { opacity:1; transform:translateX(0); }
}

.lt-org {
  display:inline-flex; align-items:center; gap:8px;
  margin-top:2px;
}
.lt-org-pill {
  font-size:11px; font-weight:700; letter-spacing:2px;
  color:var(--gold); text-transform:uppercase;
  background:var(--gold-dim);
  border:1px solid rgba(255,215,0,0.25);
  border-radius:20px; padding:3px 12px;
}

/* ── Social CTA (bottom-right) ── */
.social-cta {
  position:absolute;
  bottom:64px; right:430px;
  display:flex; align-items:center; gap:14px;
  background:rgba(6,6,20,0.90);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1.5px solid rgba(24,119,242,0.55);
  border-radius:28px; padding:12px 24px;
  opacity:0; transition:opacity var(--t-fast);
  box-shadow:0 0 24px rgba(24,119,242,0.20), 0 4px 20px rgba(0,0,0,0.5);
  animation:socialPulse 3s ease-in-out infinite;
}
.social-cta.visible { opacity:1; }

@keyframes socialPulse {
  0%,100% { box-shadow:0 0 12px rgba(24,119,242,0.20), 0 4px 20px rgba(0,0,0,0.5); }
  50%      { box-shadow:0 0 28px rgba(24,119,242,0.50), 0 4px 20px rgba(0,0,0,0.5); }
}

.social-fb-icon {
  width:38px; height:38px; border-radius:50%;
  background:#1877F2;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 10px rgba(24,119,242,0.5);
}
.social-fb-icon svg { width:22px; height:22px; fill:#fff; }

.social-text {
  font-size:13px; font-weight:600; letter-spacing:2px;
  color:rgba(255,255,255,0.75); text-transform:uppercase;
}
.social-name {
  font-size:16px; font-weight:900; letter-spacing:1px;
  color:#fff;
}

/* ── Bottom Bar ── */
.bottom-bar {
  position:absolute; bottom:0; left:0; right:0;
  height:52px;
  background:rgba(4,4,12,0.95);
  border-top:1px solid rgba(255,215,0,0.20);
  display:flex; align-items:center; justify-content:center;
  gap:16px;
}
.bb-ball { font-size:20px; }
.bb-text { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.45); text-transform:uppercase; }
.bb-sep  { width:1px; height:20px; background:rgba(255,215,0,0.25); }
.bb-brand{ font-size:14px; font-weight:900; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
</style>
</head>

<script>
  let _currentMode = 'overlay';   // default: transparent, sobre cámara en vivo

  // ── API pública WebSocket ──
  window.obsOverlay = {

    setSpeaker(name, role, side) {
      side = side || 'left';
      const badge = side === 'left' ? 'ENTREVISTADOR' : 'INVITADO';
      document.getElementById('lt-name').textContent       = (name || 'Speaker').toUpperCase();
      document.getElementById('lt-role').textContent       = (role || 'Invitado').toUpperCase();
      document.getElementById('lt-role-badge').textContent = badge;
      document.getElementById('lower-third').classList.add('visible');
    },

    clearSpeaker() {
      document.getElementById('lower-third').classList.remove('visible');
    },

    setTopic(text) {
      if (!text) return;
      document.getElementById('ticker-text').textContent = text + ' · ' + text + ' · ';
      document.getElementById('topic-ticker').classList.add('visible');
    },

    clearTopic() {
      document.getElementById('topic-ticker').classList.remove('visible');
    },

    showBadge(text) {
      if (text) document.getElementById('badge-label').textContent = text.toUpperCase();
      document.getElementById('interview-badge').classList.add('visible');
    },

    hideBadge() {
      document.getElementById('interview-badge').classList.remove('visible');
    },

    setMode(mode) {
      _currentMode = mode || 'overlay';
      document.body.classList.remove('mode-overlay','mode-standalone','mode-lower-third');
      if (_currentMode !== 'overlay') {
        document.body.classList.add('mode-' + _currentMode);
      }
      // overlay = no class needed (default transparent body)
    },

    setSocial(text) {
      if (text) document.getElementById('social-name').textContent = text;
      document.getElementById('social-cta').classList.add('visible');
    },

    setInterviewTitle(text) {
      window.obsOverlay.showBadge(text);
    }
  };

  // ── WebSocket relay con exponential backoff ──
  let _wsDelay = 1000;
  (function wsConnect() {
    const ws = new WebSocket('ws://localhost:8889');
    ws.onopen  = () => { _wsDelay = 1000; };
    ws.onmessage = (e) => {
      try {
        const cmd = JSON.parse(e.data);
        if (window.obsOverlay && window.obsOverlay[cmd.fn])
          window.obsOverlay[cmd.fn](...(cmd.args || []));
      } catch(_) {}
    };
    ws.onclose = () => { setTimeout(wsConnect, _wsDelay); _wsDelay = Math.min(_wsDelay * 1.5, 30000); };
  })();
</script>
