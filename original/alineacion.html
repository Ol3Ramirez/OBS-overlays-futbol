<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alineación</title>
<script src="config.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: transparent;
    font-family: 'Arial Black', sans-serif;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  :root {
    --gold: #FFD700;
    --glass: rgba(6, 6, 18, 0.92);
    --accent: #00e5ff;
    --border: rgba(255,255,255,0.08);
  }

  .lineup-container {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    background: rgba(6, 6, 18, 0.97);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 16px 0;
    animation: slideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes slideInLeft {
    from { transform: translateY(-50%) translateX(-340px); opacity:0; }
    to   { transform: translateY(-50%) translateX(0);      opacity:1; }
  }

  .lineup-header {
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .lineup-logo {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .lineup-team-name {
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .lineup-formation {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .players-list {
    padding: 8px 0;
  }

  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
    animation: fadeIn 0.3s ease both;
  }

  .player-row:hover { background: rgba(255,255,255,0.04); }

  @keyframes fadeIn {
    from { opacity:0; transform: translateX(-10px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .player-num {
    width: 24px;
    font-size: 13px;
    font-weight: 900;
    color: var(--gold);
    text-align: center;
    flex-shrink: 0;
  }

  .player-name {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    flex: 1;
    text-transform: uppercase;
  }

  .player-pos {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    width: 32px;
    text-align: right;
  }

  .captain-badge {
    font-size: 10px;
    background: var(--gold);
    color: #000;
    border-radius: 2px;
    padding: 1px 4px;
    font-weight: 900;
    letter-spacing: 0.5px;
  }

  .coach-row {
    padding: 10px 16px 4px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coach-label {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .coach-name {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 700;
  }

  /* ---- Campo táctico (derecha) ---- */
  .field-view {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    height: 480px;
    background: rgba(6, 6, 18, 0.97);
    border: 1px solid var(--border);
    border-right: 3px solid var(--accent);
    border-radius: 8px 0 0 8px;
    padding: 12px;
    animation: slideInRight 0.5s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes slideInRight {
    from { transform: translateY(-50%) translateX(340px); opacity:0; }
    to   { transform: translateY(-50%) translateX(0);      opacity:1; }
  }

  .field-title {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .field-pitch {
    width: 100%;
    height: calc(100% - 30px);
    background: linear-gradient(180deg,
      #1a472a 0%, #1e5c34 12.5%,
      #1a472a 12.5%, #1e5c34 25%,
      #1a472a 25%, #1e5c34 37.5%,
      #1a472a 37.5%, #1e5c34 50%,
      #1a472a 50%, #1e5c34 62.5%,
      #1a472a 62.5%, #1e5c34 75%,
      #1a472a 75%, #1e5c34 87.5%,
      #1a472a 87.5%, #1e5c34 100%
    );
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .field-pitch::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 10%;
    width: 80%;
    height: 1px;
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%);
  }

  .field-pitch::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px; height: 60px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  .dot {
    position: absolute;
    width: 28px; height: 28px;
    background: rgba(255,213,0,0.9);
    border: 2px solid rgba(0,0,0,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-weight: 900;
    color: #000;
    cursor: pointer;
    will-change: transform, opacity;
    animation: dotPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    z-index: 1;
  }
  @keyframes dotPop {
    from { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    to   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  }
  .dot:hover { transform: translate(-50%, -50%) scale(1.2); }

  .dot.captain {
    background: #FFD700;
    border: 2px solid rgba(255,255,255,0.7);
  }
  .dot.captain::before {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border: 2px solid rgba(255,213,0,0.55);
    border-radius: 50%;
    animation: captainRing 1.8s ease-in-out infinite;
    will-change: transform, opacity;
  }
  @keyframes captainRing {
    0%,100% { transform: scale(0.95); opacity: 0.7; }
    50%     { transform: scale(1.3);  opacity: 0; }
  }

  /* Pitch depth overlay */
  .pitch-depth {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
    z-index: 0;
    border-radius: 4px;
  }

  /* Tooltips de nombres */
  .dot::after {
    content: attr(data-name);
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 8px;
    padding: 2px 5px;
    border-radius: 3px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
  .dot:hover::after { opacity: 1; }

  .player-name { transition: color 0.2s; }
  .player-row:hover .player-name { color: var(--gold); }
</style>
</head>
<body>

<!-- LISTA DE ALINEACIÓN -->
<div class="lineup-container" id="lineup-container">
  <div class="lineup-header">
    <div class="lineup-logo" id="team-logo">⚽</div>
    <div>
      <div class="lineup-team-name" id="team-name">LOCAL FC</div>
      <div class="lineup-formation" id="team-formation">4-3-3</div>
    </div>
  </div>

  <div class="players-list" id="players-list">
    <!-- Generado por JS -->
  </div>

  <div class="coach-row">
    <span class="coach-label">DT</span>
    <span class="coach-name" id="coach-name">Entrenador</span>
  </div>
</div>

<!-- VISTA DE CAMPO TÁCTICO -->
<div class="field-view" id="field-view">
  <div class="field-title">FORMACIÓN TÁCTICA</div>
  <div class="field-pitch" id="field-pitch">
    <div class="pitch-depth"></div>
    <!-- Puntos generados por JS -->
  </div>
</div>

<script>
  // ── Datos del equipo (editar aquí o via obsOverlay API) ──
  const teamData = {
    name: 'LOCAL FC',
    logo: '⚽',
    formation: '4-3-3',
    coach: 'J. Pérez',
    players: [
      { num: 1,  name: 'García',    pos: 'POR', x: 50, y: 90 },
      { num: 2,  name: 'Martínez',  pos: 'DEF', x: 20, y: 72 },
      { num: 5,  name: 'López',     pos: 'DEF', x: 38, y: 72 },
      { num: 6,  name: 'Hernández', pos: 'DEF', x: 62, y: 72 },
      { num: 3,  name: 'Rodríguez', pos: 'DEF', x: 80, y: 72 },
      { num: 8,  name: 'González',  pos: 'MED', x: 25, y: 50, captain: true },
      { num: 10, name: 'Sánchez',   pos: 'MED', x: 50, y: 45 },
      { num: 14, name: 'Ramírez',   pos: 'MED', x: 75, y: 50 },
      { num: 11, name: 'Torres',    pos: 'DEL', x: 20, y: 22 },
      { num: 9,  name: 'Flores',    pos: 'DEL', x: 50, y: 15 },
      { num: 7,  name: 'Vargas',    pos: 'DEL', x: 80, y: 22 },
    ]
  };

  function render(data) {
    document.getElementById('team-name').textContent = data.name.toUpperCase();
    document.getElementById('team-logo').textContent = data.logo || '⚽';
    document.getElementById('team-formation').textContent = data.formation;
    document.getElementById('coach-name').textContent = data.coach;

    const list = document.getElementById('players-list');
    list.innerHTML = '';
    const frag = document.createDocumentFragment();
    data.players.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'player-row';
      row.style.animationDelay = `${i * 40}ms`;
      row.innerHTML = `
        <span class="player-num">${p.num}</span>
        <span class="player-name">${p.name}${p.captain ? ' <span class="captain-badge">C</span>' : ''}</span>
        <span class="player-pos">${p.pos}</span>
      `;
      frag.appendChild(row);
    });
    list.appendChild(frag);

    const pitch = document.getElementById('field-pitch');
    pitch.querySelectorAll('.dot').forEach(d => d.remove());
    const dotFrag = document.createDocumentFragment();
    data.players.forEach((p, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (p.captain ? ' captain' : '');
      dot.style.left = p.x + '%';
      dot.style.top  = p.y + '%';
      dot.style.animationDelay = `${i * 80}ms`;
      dot.setAttribute('data-name', p.name);
      dot.textContent = p.num;
      dotFrag.appendChild(dot);
    });
    pitch.appendChild(dotFrag);
  }

  render(teamData);

  // ── API pública OBS ──
  window.obsOverlay = {
    setTeam: (data) => { Object.assign(teamData, data); render(teamData); },
    setName: (name) => { teamData.name = name; render(teamData); },
    setFormation: (f) => { teamData.formation = f; render(teamData); },
  };

  // WebSocket relay con exponential backoff
  let _wsDelay = 1000;
  (function wsConnect() {
    const ws = new WebSocket('ws://localhost:8889');
    ws.onopen  = () => { _wsDelay = 1000; };
    ws.onmessage = (e) => {
      try {
        const cmd = JSON.parse(e.data);
        if (window.obsOverlay && window.obsOverlay[cmd.fn])
          window.obsOverlay[cmd.fn](...(cmd.args || []));
      } catch(_) {}
    };
    ws.onclose = () => { setTimeout(wsConnect, _wsDelay); _wsDelay = Math.min(_wsDelay * 1.5, 30000); };
  })();
</script>
<script src="ws-client.js"></script>
</body>
</html>
