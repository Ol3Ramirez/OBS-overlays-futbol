<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla de Inicio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: linear-gradient(160deg, #0a0f1e 0%, #0d1526 60%, #081018 100%);
    font-family: 'Arial Black', sans-serif;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Líneas decorativas de fondo ── */
  .bg-lines {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .bg-lines::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%;
    width: 1px; height: 1600px;
    background: linear-gradient(180deg, transparent, rgba(0,229,255,0.06), transparent);
    transform: rotate(-20deg);
  }
  .bg-lines::after {
    content: '';
    position: absolute;
    top: -200px; left: 40%;
    width: 1px; height: 1600px;
    background: linear-gradient(180deg, transparent, rgba(255,215,0,0.04), transparent);
    transform: rotate(20deg);
  }

  .corner-accent {
    position: absolute;
    width: 200px; height: 200px;
    border: 1px solid rgba(0,229,255,0.08);
  }
  .corner-accent.tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
  .corner-accent.tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
  .corner-accent.bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
  .corner-accent.br { bottom: 40px; right: 40px; border-left: none; border-top: none; }

  /* ── Logo ── */
  .logo-wrap {
    margin-bottom: 40px;
    background: rgba(255,255,255,0.93);
    border-radius: 18px;
    padding: 22px 36px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.55),
                0 0 0 1px rgba(255,255,255,0.12),
                0 0 60px rgba(0,229,255,0.06);
    animation: fadeDown 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .logo-wrap img {
    width: 300px;
    display: block;
  }

  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-40px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Línea divisora ── */
  .divider {
    width: 320px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), transparent);
    margin-bottom: 32px;
    animation: fadeDown 0.8s 0.2s both;
  }

  /* ── Texto "EL PARTIDO COMIENZA EN" ── */
  .label {
    font-size: 22px;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: fadeDown 0.8s 0.3s both;
  }

  /* ── Countdown ── */
  .countdown {
    font-size: 160px;
    font-weight: 900;
    color: #FFD700;
    letter-spacing: 12px;
    line-height: 1;
    text-shadow:
      0 0 60px rgba(255,215,0,0.35),
      0 0 20px rgba(255,215,0,0.2),
      3px 3px 0 rgba(0,0,0,0.4);
    animation: fadeDown 0.8s 0.4s both;
    position: relative;
    will-change: transform;
  }
  .countdown.pulse {
    animation: countPulse 0.18s ease-out;
  }
  @keyframes countPulse {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* ── Mensaje final ── */
  .final-msg {
    font-size: 72px;
    font-weight: 900;
    color: #FFD700;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(255,215,0,0.6);
    display: none;
    animation: finalBurst 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards,
               finalShake 0.5s ease 0.7s both;
  }
  @keyframes finalBurst {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  @keyframes finalShake {
    0%,100% { transform: scale(1) rotate(0deg); }
    25%     { transform: scale(1.04) rotate(-2deg); }
    75%     { transform: scale(1.04) rotate(2deg); }
  }

  /* ── Sparkles de fondo ── */
  .sparkle {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    will-change: transform, opacity;
    animation: sparklePulse var(--sd, 2.2s) var(--sdelay, 0s) ease-in-out infinite;
  }
  @keyframes sparklePulse {
    0%,100% { transform: scale(1) translateY(0);   opacity: 0.5; }
    50%     { transform: scale(1.8) translateY(-9px); opacity: 1; }
  }

  /* ── Logo glow burst ── */
  .logo-glow {
    position: absolute;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.18) 0%, transparent 70%);
    animation: glowBurst 1.6s ease-out both;
    pointer-events: none;
    will-change: transform, opacity;
  }
  @keyframes glowBurst {
    0%   { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(3.5); opacity: 0; }
  }

  /* ── Subtexto "FÚTBOL 5 EN VIVO" ── */
  .live-badge {
    margin-top: 36px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeDown 0.8s 0.6s both;
  }
  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff3b3b;
    animation: liveBlink 1.2s ease-in-out infinite;
  }
  @keyframes liveBlink {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px #ff3b3b; }
    50%       { opacity: 0.3; box-shadow: none; }
  }
  .live-text {
    font-size: 18px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  /* ── Sponsor tag abajo ── */
  .sponsor-tag {
    position: absolute;
    bottom: 50px;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    animation: fadeDown 1s 0.8s both;
  }
</style>
</head>
<body>

<div class="bg-lines"></div>
<div class="corner-accent tl"></div>
<div class="corner-accent tr"></div>
<div class="corner-accent bl"></div>
<div class="corner-accent br"></div>

<!-- Sparkles de fondo -->
<div class="sparkle" style="left:10%;top:15%;background:#FFD700;--sd:2.4s;--sdelay:0s"></div>
<div class="sparkle" style="left:85%;top:20%;background:#00e5ff;--sd:2.8s;--sdelay:0.4s"></div>
<div class="sparkle" style="left:25%;top:72%;background:#FFD700;--sd:2.1s;--sdelay:0.8s"></div>
<div class="sparkle" style="left:78%;top:65%;background:#FFD700;--sd:3.0s;--sdelay:0.2s"></div>
<div class="sparkle" style="left:5%;top:50%;background:#00e5ff;--sd:2.5s;--sdelay:1.1s"></div>
<div class="sparkle" style="left:93%;top:45%;background:#FFD700;--sd:2.2s;--sdelay:0.6s"></div>
<div class="sparkle" style="left:48%;top:8%;background:#00e5ff;--sd:2.7s;--sdelay:0.3s"></div>
<div class="sparkle" style="left:58%;top:92%;background:#FFD700;--sd:2.3s;--sdelay:0.9s"></div>

<div class="logo-glow"></div>
<div class="logo-wrap">
  <img src="./logo_sponsor.jpg" alt="Avila Fisioterapia" />
</div>

<div class="divider"></div>
<div class="label" id="main-label">El partido comienza en</div>

<div class="countdown" id="countdown">05:00</div>
<div class="final-msg" id="final-msg">¡Ya Comenzamos!</div>

<div class="live-badge">
  <div class="live-dot"></div>
  <div class="live-text">Fútbol 5 en vivo</div>
</div>

<div class="sponsor-tag">Transmisión patrocinada por Avila Fisioterapia y Rehabilitación</div>

<script>
  let totalSeconds = 300;
  let remaining   = totalSeconds;
  let interval    = null;
  let finished    = false;

  function fmt(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sc = String(s % 60).padStart(2, '0');
    return `${m}:${sc}`;
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(interval);
      interval = null;
      finished = true;
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('main-label').style.display = 'none';
      const fm = document.getElementById('final-msg');
      fm.style.display = 'block';
      return;
    }
    remaining--;
    const el = document.getElementById('countdown');
    el.textContent = fmt(remaining);
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }

  function startCountdown(seconds) {
    if (seconds !== undefined) { remaining = seconds; totalSeconds = seconds; }
    if (finished) {
      finished = false;
      document.getElementById('countdown').style.display = 'block';
      document.getElementById('main-label').style.display = 'block';
      document.getElementById('final-msg').style.display = 'none';
    }
    document.getElementById('countdown').textContent = fmt(remaining);
    if (interval) clearInterval(interval);
    interval = setInterval(tick, 1000);
  }

  function stopCountdown() {
    if (interval) { clearInterval(interval); interval = null; }
  }

  function resetCountdown(seconds) {
    stopCountdown();
    remaining = seconds !== undefined ? seconds : totalSeconds;
    finished = false;
    document.getElementById('countdown').style.display = 'block';
    document.getElementById('main-label').style.display = 'block';
    document.getElementById('final-msg').style.display = 'none';
    document.getElementById('countdown').textContent = fmt(remaining);
  }

  // Auto-inicia al cargar
  startCountdown(300);

  // ── API pública OBS ──
  window.obsOverlay = { startCountdown, stopCountdown, resetCountdown };

  // WebSocket relay con exponential backoff
  let _wsDelay = 1000;
  (function wsConnect() {
    const ws = new WebSocket('ws://localhost:8889');
    ws.onopen  = () => { _wsDelay = 1000; };
    ws.onmessage = (e) => {
      try {
        const cmd = JSON.parse(e.data);
        if (window.obsOverlay && window.obsOverlay[cmd.fn])
          window.obsOverlay[cmd.fn](...(cmd.args || []));
      } catch(_) {}
    };
    ws.onclose = () => { setTimeout(wsConnect, _wsDelay); _wsDelay = Math.min(_wsDelay * 1.5, 30000); };
  })();
</script>
<script src="ws-client.js"></script>
</body>
</html>
